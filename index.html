<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>링크 모음</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .title {
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: white;
      transition: all 0.25s ease;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .link-card:active {
      transform: translateY(0);
    }

    .icon {
      width: 48px;
      height: 48px;
      background: #FF0000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
    }

    .link-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 2px;
    }

    .arrow {
      opacity: 0.6;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="title">영상 링크</p>

    <a class="link-card" href="https://www.youtube.com/watch?v=hJsPrZdULXE" target="_blank" rel="noopener noreferrer">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">상처를 끌어안은 사랑</div>
        <div class="link-sub">YouTube</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="link-card" href="https://www.youtube.com/watch?v=8-KDN_-5zJA" target="_blank" rel="noopener noreferrer">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </div>
      <div class="link-text">
        <div class="link-label">최고의 행복</div>
        <div class="link-sub">YouTube</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</body>
</html>
