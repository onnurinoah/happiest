<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제자유형 테스트</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fdf8f0;
      --card: #ffffff;
      --gold: #c9973a;
      --gold-light: #f0d98a;
      --brown: #5c3d1e;
      --text: #2d1f0f;
      --muted: #9e8872;
      --radius: 20px;
    }

    body {
      background: var(--bg);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ── SCREEN STATES ── */
    .screen { display: none !important; }
    .screen.active { display: block !important; }
    #start.active { display: flex !important; }

    /* ── START SCREEN ── */
    #start {
      background: linear-gradient(160deg, #3a1f0e 0%, #7a4a1e 50%, #c9973a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    #start::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .start-fish {
      font-size: 48px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .start-title {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .start-headline {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .start-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .start-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
      text-align: left;
    }
    .start-card p {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      line-height: 1.7;
    }

    .btn-start {
      background: var(--gold-light);
      color: var(--brown);
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,151,58,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-start:active { transform: scale(0.97); }

    /* ── QUIZ SCREEN ── */
    #quiz {
      min-height: 100vh;
      padding: 0 0 40px;
    }

    .quiz-header {
      background: var(--brown);
      padding: 16px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .quiz-label {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    .quiz-count {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold-light);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .quiz-body {
      padding: 28px 20px 0;
    }

    .question-num {
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 28px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: var(--card);
      border: 2px solid #e8ddd0;
      border-radius: 14px;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .option-btn:hover { border-color: var(--gold); background: #fffbf5; }
    .option-btn.selected { border-color: var(--gold); background: #fff8e7; }
    .option-btn:active { transform: scale(0.98); }

    .option-label {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f0e8da;
      color: var(--brown);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-btn.selected .option-label {
      background: var(--gold);
      color: #fff;
    }

    .option-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
    }

    .quiz-nav {
      padding: 24px 20px 0;
      display: flex;
      gap: 12px;
    }

    .btn-prev, .btn-next {
      border-radius: 50px;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-prev {
      flex: 1;
      background: #e8ddd0;
      color: var(--brown);
    }
    /* 결과보기 버튼: 마지막 질문에서만 표시 */
    .btn-next {
      flex: 2;
      background: var(--brown);
      color: #fff;
      display: none;
    }
    .btn-next.visible { display: block; }
    .btn-next:active { transform: scale(0.98); }

    /* ── RESULT SCREEN ── */
    #result {
      min-height: 100vh;
    }

    .result-hero {
      background: linear-gradient(160deg, #3a1f0e 0%, #7a4a1e 60%, #c9973a 100%);
      padding: 40px 24px 0;
      text-align: center;
      position: relative;
    }

    .result-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .result-type {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold-light);
      margin-bottom: 6px;
    }

    .result-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Character image frame — 흰 카드 */
    .char-frame {
      width: 220px;
      height: 210px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .char-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .char-img[src=""] { display: none; }

    /* 다른 제자 보기 */
    .disciple-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .disciple-chip {
      background: #f0e8da;
      border: 2px solid transparent;
      color: var(--brown);
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .disciple-chip:hover { background: #e8ddd0; }
    .disciple-chip.active {
      background: var(--brown);
      color: #fff;
      border-color: var(--brown);
    }

    .result-body {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-description {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .result-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f0e8da;
    }

    .strength-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #fff8e7;
      border: 1px solid var(--gold-light);
      color: var(--brown);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .chip.weak {
      background: #fff3f0;
      border-color: #f5c6b0;
      color: #8b3a1e;
    }

    .result-section p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }

    .invite-box {
      background: linear-gradient(135deg, #3a1f0e, #7a4a1e);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(58,31,14,0.2);
    }

    .invite-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .invite-verse {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold-light);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .invite-ref {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .mission-box {
      background: #f8f4ee;
      border-left: 4px solid var(--gold);
      border-radius: 0 14px 14px 0;
      padding: 18px 20px;
    }

    .mission-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .mission-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
    }

    .bible-ref {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .bible-icon {
      font-size: 28px;
    }

    .bible-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .bible-text strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 2px;
    }

    .btn-retry {
      width: 100%;
      background: var(--brown);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s;
      margin-top: 8px;
    }
    .btn-retry:active { transform: scale(0.98); }


    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8);
      color: #fff;
      border-radius: 99px;
      padding: 10px 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── ANIMATIONS ── */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .slide-up { animation: slideUp 0.4s ease forwards; }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ START SCREEN ══ -->
  <div id="start" class="screen active">
    <div class="start-fish">🐟</div>
    <p class="start-title">제자유형 테스트</p>
    <h1 class="start-headline">나는 예수님의<br>어떤 제자일까?</h1>
    <div class="start-card">
      <p>📋 &nbsp;16개의 질문<br>⏱️ &nbsp;약 5분 소요<br>🎯 &nbsp;열한 제자 중 나와 닮은 유형 발견</p>
    </div>
    <button class="btn-start" id="btnStart">테스트 시작하기 →</button>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="quiz-label">나는 어떤 제자일까?</span>
        <span class="quiz-count" id="qCount">1 / 12</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="quiz-body">
      <p class="question-num" id="qNum">Q 01</p>
      <p class="question-text" id="qText"></p>
      <div class="options" id="optionsContainer"></div>
    </div>
    <div class="quiz-nav">
      <button class="btn-prev" id="btnPrev">← 이전</button>
      <button class="btn-next" id="btnNext">결과 보기 ✨</button>
    </div>
  </div>

  <!-- ══ RESULT SCREEN ══ -->
  <div id="result" class="screen">
    <div class="result-hero">
      <p class="result-label">당신의 제자 유형</p>
      <p class="result-type" id="rName"></p>
      <p class="result-tagline" id="rTagline"></p>
      <div class="char-frame">
        <img class="char-img" id="rCharImg" src="" alt="" />
      </div>
    </div>
    <div class="result-body">
      <div class="result-description" id="rDesc"></div>

      <div class="result-section">
        <p class="section-title">강점</p>
        <div class="strength-chips" id="rStrengths"></div>
      </div>

      <div class="result-section">
        <p class="section-title">조심할 점</p>
        <div class="strength-chips" id="rWeaks"></div>
      </div>

      <div class="invite-box">
        <p class="invite-label">JESUS' INVITATION</p>
        <p class="invite-verse" id="rInvite"></p>
        <p class="invite-ref" id="rRef"></p>
      </div>

      <div class="mission-box">
        <p class="mission-label">오늘의 제자 미션</p>
        <p class="mission-text" id="rMission"></p>
      </div>

      <div class="bible-ref">
        <span class="bible-icon">📖</span>
        <div class="bible-text">
          <strong id="rVerse"></strong>
          <span id="rVerseRef"></span>
        </div>
      </div>

      <div class="result-section" style="display:none">
        <p class="section-title">다른 제자 유형 살펴보기</p>
        <div class="disciple-grid" id="discipleGrid"></div>
      </div>

      <button class="btn-retry" id="btnRetry">테스트 다시 하기 🔄</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── QUESTIONS ──
const questions = [
  {
    text: "공동체에서 새로운 프로젝트를 시작하자고 할 때, 나는 보통?",
    options: [
      { text: '"좋아, 일단 내가 먼저 해볼게!" 하고 바로 움직인다.', scores: { peter:2, james:1 } },
      { text: '누가 함께하면 좋을지 떠올리고 조용히 사람들을 연결한다.', scores: { andrew:2, john:1 } },
      { text: '필요한 인원, 예산, 일정부터 계산해본다.', scores: { philip:2, matthew:1 } },
      { text: '이 일이 정말 필요한 일인지, 방향이 맞는지 먼저 묻는다.', scores: { thomas:2, bartholomew:1 } },
    ]
  },
  {
    text: "친구가 신앙적으로 힘들다고 털어놓을 때, 나는?",
    options: [
      { text: '"괜찮아, 같이 기도하자. 내가 옆에 있을게."라고 바로 반응한다.', scores: { peter:2, john:1 } },
      { text: '그 친구가 만날 만한 좋은 사람이나 공동체를 소개해준다.', scores: { andrew:2, thaddaeus:1 } },
      { text: '친구의 이야기를 차분히 듣고, 왜 힘든지 정리해준다.', scores: { matthew:2, philip:1 } },
      { text: '쉽게 위로하기보다, 그 친구의 질문을 같이 붙들어준다.', scores: { thomas:2, bartholomew:1 } },
    ]
  },
  {
    text: "예배나 집회에서 강한 은혜를 받았을 때 나는?",
    options: [
      { text: '바로 결단하고, 무언가 행동으로 옮기고 싶어진다.', scores: { peter:2, james:1 } },
      { text: '조용히 마음에 오래 담고, 하나님과의 친밀함을 느낀다.', scores: { john:2, jamesA:1 } },
      { text: '은혜가 좋았지만, 이걸 일상에서 어떻게 적용할지 생각한다.', scores: { philip:2, matthew:1 } },
      { text: '감동은 있었지만, 정말 내 믿음이 된 것인지 스스로 점검한다.', scores: { thomas:2, bartholomew:1 } },
    ]
  },
  {
    text: "불의하거나 잘못된 상황을 보면 나는?",
    options: [
      { text: '참지 못하고 바로 말하거나 행동한다.', scores: { simon:2, peter:1 } },
      { text: '마음은 뜨겁지만, 먼저 관계가 깨지지 않게 표현하려 한다.', scores: { john:2, andrew:1 } },
      { text: '문제의 구조와 원인을 파악한 뒤 해결책을 생각한다.', scores: { philip:2, matthew:1 } },
      { text: '겉으로 보이는 분노보다, 그 안에 숨은 진짜 문제를 보려 한다.', scores: { bartholomew:2, thaddaeus:1 } },
    ]
  },
  {
    text: "내게 '예수님을 따른다'는 것은 더 가깝다.",
    options: [
      { text: '주님을 위해 앞장서고, 넘어져도 다시 일어나는 것', scores: { peter:3 } },
      { text: '주님의 사랑 안에 깊이 머물고, 그 사랑을 흘려보내는 것', scores: { john:3 } },
      { text: '드러나지 않아도 묵묵히 맡겨진 자리를 지키는 것', scores: { thaddaeus:3 } },
      { text: '조용하지만 신실하게 주님 곁에 끝까지 남아 있는 것', scores: { jamesA:3 } },
    ]
  },
  {
    text: "팀 안에서 내가 가장 자연스럽게 맡는 역할은?",
    options: [
      { text: '분위기를 이끌고 결정을 밀어붙이는 역할', scores: { peter:2, james:1 } },
      { text: '사람들의 마음을 살피고 관계를 이어주는 역할', scores: { john:2, andrew:1 } },
      { text: '기록하고 정리하고 실제 운영이 되게 만드는 역할', scores: { matthew:2, philip:1 } },
      { text: '남들이 놓치는 질문이나 위험 요소를 짚어주는 역할', scores: { thomas:2, bartholomew:1 } },
    ]

// ── STATE ──
let scores = {};
let answers = new Array(questions.length).fill(null);
let currentQ = 0;

function initScores() {
  scores = { peter:0, john:0, james:0, andrew:0, philip:0, bartholomew:0, thomas:0, matthew:0, jamesA:0, thaddaeus:0, simon:0 };
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
  const el = document.getElementById(id);
  el.style.display = '';
  el.classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  initScores();
  answers.fill(null);
  currentQ = 0;
  renderQuestion();
  showScreen('quiz');
}

function retryQuiz() {
  showScreen('start');
}

// ── RENDER QUESTION ──
function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('qCount').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('qNum').textContent = `Q ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = `${((currentQ) / questions.length) * 100}%`;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn slide-up';
    btn.style.animationDelay = `${idx * 0.05}s`;
    if (answers[currentQ] === idx) btn.classList.add('selected');
    btn.innerHTML = `
      <span class="option-label">${labels[idx]}</span>
      <span class="option-text">${opt.text}</span>
    `;
    btn.addEventListener('click', () => selectOption(idx));
    container.appendChild(btn);
  });

  updateNextBtn();

  // prev button
  const prevBtn = document.querySelector('.btn-prev');
  prevBtn.style.display = currentQ === 0 ? 'none' : '';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
    btn.style.pointerEvents = 'none'; // 중복 클릭 방지
  });
  updateNextBtn();

  const isLast = currentQ === questions.length - 1;
  if (!isLast) {
    // 중간 질문: 400ms 후 자동 넘김
    setTimeout(() => nextQ(), 380);
  }
  // 마지막 질문: '결과 보기' 버튼이 나타남
}

function updateNextBtn() {
  const btn = document.getElementById('btnNext');
  const isLast = currentQ === questions.length - 1;
  // 결과보기 버튼은 마지막 질문 + 답변 선택 시에만 표시
  if (isLast && answers[currentQ] !== null) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

function nextQ() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

// ── CALCULATE RESULT ──
function showResult() {
  initScores();
  answers.forEach((ansIdx, qIdx) => {
    if (ansIdx === null) return;
    const s = questions[qIdx].options[ansIdx].scores;
    Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  });

  // 각 유형의 최대 획득 가능 점수 계산 (문항당 가장 높은 점수 합산)
  const maxScores = {};
  questions.forEach(q => {
    const best = {};
    q.options.forEach(opt => {
      Object.entries(opt.scores).forEach(([k, v]) => {
        if (!best[k] || v > best[k]) best[k] = v;
      });
    });
    Object.entries(best).forEach(([k, v]) => {
      maxScores[k] = (maxScores[k] || 0) + v;
    });
  });

  // 정규화된 비율로 우승자 결정
  const winner = Object.entries(scores)
    .map(([k, v]) => [k, v / (maxScores[k] || 1)])
    .sort((a, b) => b[1] - a[1])[0][0];

  renderResult(winner);
  showScreen('result');
}

function renderResult(key) {
  const data = results[key];
  document.getElementById('rName').textContent = data.name;
  document.getElementById('rTagline').textContent = data.tagline;
  document.getElementById('rCharImg').src = data.img || '';
  document.getElementById('rDesc').innerHTML = data.description.replace(/\n\n/g, '<br><br>');
  document.getElementById('rStrengths').innerHTML = data.strengths.map(s => `<span class="chip">${s}</span>`).join('');
  document.getElementById('rWeaks').innerHTML = data.weaknesses.map(w => `<span class="chip weak">${w}</span>`).join('');
  document.getElementById('rInvite').textContent = data.invite;
  document.getElementById('rRef').textContent = data.inviteRef;
  document.getElementById('rMission').textContent = data.mission;
  document.getElementById('rVerse').textContent = data.verse;
  document.getElementById('rVerseRef').textContent = data.verseRef;

  // 다른 제자 버튼 렌더링
  const grid = document.getElementById('discipleGrid');
  grid.innerHTML = Object.entries(results).map(([k, d]) =>
    `<button class="disciple-chip${k === key ? ' active' : ''}" data-key="${k}">${d.name}</button>`
  ).join('');
  grid.querySelectorAll('.disciple-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      renderResult(btn.dataset.key);
      window.scrollTo(0, 0);
    });
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnStart').addEventListener('click', startQuiz);
  document.getElementById('btnPrev').addEventListener('click', prevQ);
  document.getElementById('btnNext').addEventListener('click', nextQ);
  document.getElementById('btnRetry').addEventListener('click', retryQuiz);
});
</script>
